services:

  hospitaldb:
    image: postgres:17
    container_name: hospitaldb
    environment:
      POSTGRES_DB: hospitaldb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vishal

  hospital:
    image: hospital:v1
    container_name: hospital
    ports:
      - "8080:8080"

    env_file:
      - .env

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://hospitaldb:5432/hospitaldb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: vishal

      JWT_SECRET: ${JWT_SECRET}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}

    deploy:
      resources:
        limits:
          memory: 700m
    depends_on:
      - hospitaldb

