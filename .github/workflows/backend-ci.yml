name: Backend CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: hospitalmanagement
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: vishal

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres -d hospitalmanagement"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/hospitalmanagement
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: vishal

      JWT_SECRET: test-secret

      GOOGLE_CLIENT_ID: dummy
      GOOGLE_CLIENT_SECRET: dummy

      GITHUB_CLIENT_ID: dummy
      GITHUB_CLIENT_SECRET: dummy

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Build and Test
        run: ./mvnw clean verify